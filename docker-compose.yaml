services:
  postgres:
    image: postgres:17-alpine
    container_name: uapi-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: relay
      POSTGRES_PASSWORD: relay_dev
      POSTGRES_DB: uapi
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  relay:
    build: .
    container_name: uapi
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    volumes:
      - ./config.yaml:/app/config.yaml:ro

volumes:
  pgdata:
